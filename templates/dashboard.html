<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>tachikoma-logs</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#04111f; --surface:#0b1d30; --border:rgba(79,158,255,.18);
      --text:#c5dcf2; --muted:#7fa9d4; --accent:#4f9eff;
      --green:#34d399; --purple:#a78bfa; --orange:#fb923c; --red:#ff5c73;
      --warn-bg:rgba(251,146,60,.09);  --warn-border:rgba(251,146,60,.3);
      --info-bg:rgba(79,158,255,.09);  --info-border:rgba(79,158,255,.28);
      --ok-bg:rgba(52,211,153,.09);    --ok-border:rgba(52,211,153,.28);
    }
    [data-theme="light"] {
      --bg:#dce8f5; --surface:#f5f9fd; --border:rgba(21,101,192,.2);
      --text:#0b1f38; --muted:#5b7fa6; --accent:#1565c0;
      --green:#0d7f5c; --purple:#6d28d9; --orange:#b45309; --red:#c8001e;
      --warn-bg:rgba(180,83,9,.08);    --warn-border:rgba(180,83,9,.28);
      --info-bg:rgba(21,101,192,.08);  --info-border:rgba(21,101,192,.28);
      --ok-bg:rgba(13,127,92,.08);     --ok-border:rgba(13,127,92,.28);
    }
    * { box-sizing:border-box; margin:0; padding:0 }
    html {
      background:var(--bg);
      background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,158,255,.07), transparent);
    }
    [data-theme="light"] {
      background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(21,101,192,.06), transparent);
    }
    body {
      background:transparent; color:var(--text);
      font-family:'Sora','DM Sans',sans-serif;
      padding:2rem; max-width:1200px; margin:0 auto; font-size:.875rem;
    }
    h1 {
      font-family:'JetBrains Mono','Fira Code',monospace;
      font-size:1.05rem; font-weight:600; margin-bottom:.2rem; letter-spacing:-.01em;
    }
    h1::before { content:'$ '; color:var(--accent) }
    h1::after  { content:'▋'; color:var(--accent); margin-left:.15em; animation:blink 1s step-end infinite }
    @keyframes blink { 50% { opacity:0 } }
    .meta { font-size:.67rem; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom:1.25rem; letter-spacing:.01em }

    /* ── Filters ── */
    .filters { display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; margin-bottom:1.25rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.65rem 1rem }
    .filter-group { display:flex; gap:.3rem }
    .filter-btn {
      background:transparent; color:var(--muted); border:1px solid var(--border);
      border-radius:5px; padding:.3rem .7rem; font-size:.68rem; font-weight:600;
      font-family:'JetBrains Mono',monospace; cursor:pointer; transition:all .15s; letter-spacing:.02em;
    }
    .filter-btn:hover { color:var(--text); border-color:var(--accent) }
    .filter-btn.active { background:var(--accent); color:#04111f; border-color:var(--accent) }
    [data-theme="light"] .filter-btn.active { color:#f5f9fd }
    .filter-sep { width:1px; background:var(--border); align-self:stretch }
    .model-filters { display:flex; gap:.85rem; flex-wrap:wrap }
    .model-check { display:flex; align-items:center; gap:.35rem; font-size:.7rem; color:var(--muted); cursor:pointer; user-select:none }
    .model-check input { accent-color:var(--accent); cursor:pointer }
    .model-check:hover { color:var(--text) }
    .toggle-group { margin-left:auto; display:flex; gap:.35rem }

    /* ── Stats ── */
    .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:.75rem; margin-bottom:1.25rem }
    .stat {
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:.9rem 1.1rem; border-left:2px solid var(--accent);
      transition:border-color .2s, box-shadow .2s;
    }
    .stat:hover              { box-shadow:0 0 0 1px var(--accent) inset }
    .stat.kpi-ok             { border-left-color:var(--green) }
    .stat.kpi-warn           { border-left-color:var(--orange) }
    .stat.kpi-ok:hover       { box-shadow:0 0 0 1px var(--green) inset }
    .stat.kpi-warn:hover     { box-shadow:0 0 0 1px var(--orange) inset }
    .stat .lbl { font-size:.57rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; font-weight:500 }
    .stat .val { font-size:1.45rem; font-weight:600; margin-top:.25rem; font-family:'JetBrains Mono',monospace; letter-spacing:-.03em }
    .stat .sub { font-size:.57rem; color:var(--muted); margin-top:.12rem; font-family:'JetBrains Mono',monospace }

    /* ── Charts ── */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:.85rem; margin-bottom:1.25rem }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.25rem; transition:border-color .2s }
    .card:hover { border-color:rgba(6,182,212,.3) }
    .card.full { grid-column:1/-1 }
    .card h2 { font-size:.57rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:1rem; font-family:'JetBrains Mono',monospace }
    .ch-wrap { position:relative }
    .ch-wrap canvas { position:absolute; inset:0 }

    /* ── Tips ── */
    .section-title { font-size:.57rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.7rem; font-family:'JetBrains Mono',monospace }
    .section-title::before { content:'> '; color:var(--accent) }
    .tips-section { margin-bottom:1.25rem }
    .tip { border-radius:7px; padding:.8rem 1.1rem; margin-bottom:.5rem; display:flex; gap:.8rem; align-items:flex-start }
    .tip.warn { background:var(--warn-bg); border:1px solid var(--warn-border) }
    .tip.info { background:var(--info-bg); border:1px solid var(--info-border) }
    .tip.ok   { background:var(--ok-bg);   border:1px solid var(--ok-border) }
    .tip-icon { font-size:.8rem; flex-shrink:0; margin-top:.1rem; width:1rem; text-align:center; font-family:'JetBrains Mono',monospace }
    .tip-title { font-size:.72rem; font-weight:600; margin-bottom:.25rem }
    .tip.warn .tip-title { color:var(--orange) }
    .tip.info .tip-title { color:var(--accent) }
    .tip.ok   .tip-title { color:var(--green) }
    .tip-body { font-size:.7rem; color:var(--muted); line-height:1.55 }

    /* ── Tables ── */
    .tables-section { margin-bottom:1.25rem }
    .data-table { width:100%; border-collapse:collapse; font-size:.7rem }
    .data-table th {
      text-align:left; padding:.55rem .8rem; color:var(--muted); font-size:.57rem;
      text-transform:uppercase; letter-spacing:.09em; border-bottom:1px solid var(--border);
      cursor:pointer; white-space:nowrap; user-select:none; font-family:'JetBrains Mono',monospace;
    }
    .data-table th:hover { color:var(--text) }
    .data-table th.sort-asc::after  { content:' ↑'; color:var(--accent) }
    .data-table th.sort-desc::after { content:' ↓'; color:var(--accent) }
    .data-table td { padding:.5rem .8rem; border-bottom:1px solid rgba(128,128,128,.1); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.68rem }
    .data-table tr:last-child td { border-bottom:none }
    .data-table tr:hover td { background:rgba(6,182,212,.04) }
    .model-tag { display:inline-block; padding:.1rem .5rem; border-radius:4px; font-size:.62rem; font-weight:600; letter-spacing:.02em }
    .model-tag.opus   { background:rgba(167,139,250,.15); color:var(--purple) }
    .model-tag.sonnet { background:rgba(6,182,212,.15);   color:var(--accent) }
    .model-tag.haiku  { background:rgba(52,211,153,.15);  color:var(--green) }
    .model-tag.mixed  { background:rgba(251,146,60,.15);  color:var(--orange) }
    .empty-row { color:var(--muted); font-style:italic }

    /* ── Heatmap ── */
    .heatmap-wrap { overflow-x:auto }
    .heatmap-grid { display:grid; grid-template-columns:2.5rem repeat(24,minmax(0,1fr)); gap:3px; min-width:500px }
    .hm-label { font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); display:flex; align-items:center }
    .hm-hour  { justify-content:center; padding-bottom:3px }
    .hm-day   { justify-content:flex-end; padding-right:5px }
    .hm-cell  { aspect-ratio:1; border-radius:2px; cursor:default; transition:transform .1s, opacity .1s }
    .hm-cell:hover { transform:scale(1.4); z-index:1; position:relative }

    /* ── Sessions table wrap ── */
    #sessions-table-wrap { overflow-y:auto; transition:max-height .25s ease }

    /* ── Claude prompt ── */
    .claude-section { margin-bottom:1.25rem }
    .claude-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.1rem 1.4rem; display:flex; align-items:center; gap:1.1rem }
    .claude-desc { flex:1; font-size:.72rem; color:var(--muted); line-height:1.6 }
    .claude-desc strong { color:var(--text) }
    .btn-copy { background:var(--accent); color:#04111f; border:none; border-radius:6px; padding:.58rem 1.2rem; font-size:.72rem; font-weight:700; font-family:'Sora',sans-serif; cursor:pointer; white-space:nowrap; transition:all .15s; letter-spacing:.02em }
    [data-theme="light"] .btn-copy { color:#f5f9fd }
    .btn-copy:hover { opacity:.85; transform:translateY(-1px) }
    .btn-copy.copied { background:var(--green) }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    h1                { animation:fadeUp .3s ease both; animation-delay:0s }
    .meta             { animation:fadeUp .3s ease both; animation-delay:.06s }
    .filters          { animation:fadeUp .35s ease both; animation-delay:.14s }
    .stats            { animation:fadeUp .35s ease both; animation-delay:.26s }
    .grid             { animation:fadeUp .4s ease both;  animation-delay:.46s }
    .tables-section   { animation:fadeUp .35s ease both; animation-delay:.58s }
    .tips-section     { animation:fadeUp .35s ease both; animation-delay:.66s }
    .claude-section   { animation:fadeUp .35s ease both; animation-delay:.72s }

    /* ── Responsive grid ── */
    .grid-3 { grid-template-columns:1fr 1fr 1fr }
    .grid-4 { grid-template-columns:repeat(4,1fr) }
    .claude-btns { display:flex; flex-direction:column; gap:.4rem; align-items:flex-end; flex-shrink:0 }

    @media(max-width:900px) {
      .stats  { grid-template-columns:repeat(3,1fr) }
      .grid   { grid-template-columns:1fr }
      .grid-3 { grid-template-columns:1fr 1fr }
      .grid-4 { grid-template-columns:1fr 1fr }
    }
    @media(max-width:600px) {
      body    { padding:1rem }
      .stats  { grid-template-columns:1fr 1fr }
      .stat .val { font-size:1.2rem }
      .grid, .grid-3, .grid-4 { grid-template-columns:1fr }
      .filters { flex-direction:column; align-items:flex-start }
      .toggle-group { margin-left:0 }
      #date-range-label { display:none }
      .claude-card { flex-direction:column; align-items:stretch; gap:.75rem }
      .claude-btns { flex-direction:row; justify-content:flex-end; align-items:center }
      .card { padding:.9rem }
      .data-table { min-width:460px }
      #sessions-table-wrap { overflow-x:auto }
    }
    @media(max-width:400px) {
      .stats { grid-template-columns:1fr }
      .stat .val { font-size:1.1rem }
      body { padding:.75rem }
    }
  </style>
</head>
<body>
  <h1>tachikoma-logs</h1>
  <p class="meta"><span data-i18n="meta_generated"></span> __GENERATED_AT__ &middot; Chart.js 4.4 &middot; ~/.claude/projects/</p>

  <div class="filters">
    <div class="filter-group">
      <button class="filter-btn" data-days="7"  onclick="setDateFilter(7)">7d</button>
      <button class="filter-btn active" data-days="30" onclick="setDateFilter(30)">30d</button>
      <button class="filter-btn" data-days="90" onclick="setDateFilter(90)">90d</button>
      <button class="filter-btn" data-days="0"  onclick="setDateFilter(0)" data-i18n="btn_all"></button>
    </div>
    <div class="filter-sep"></div>
    <div class="model-filters">
      <label class="model-check"><input type="checkbox" value="opus"   checked onchange="toggleModel('opus')">   Opus</label>
      <label class="model-check"><input type="checkbox" value="sonnet" checked onchange="toggleModel('sonnet')"> Sonnet</label>
      <label class="model-check"><input type="checkbox" value="haiku"  checked onchange="toggleModel('haiku')">  Haiku</label>
      <label class="model-check"><input type="checkbox" value="mixed"  checked onchange="toggleModel('mixed')">  Mixed</label>
    </div>
    <span id="date-range-label" style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:.25rem"></span>
    <div class="toggle-group">
      <button class="filter-btn" id="btn-lang"  onclick="toggleLang()">EN</button>
      <button class="filter-btn" id="btn-theme" onclick="toggleTheme()">☀</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl" data-i18n="kpi_sessions"></div><div class="val" id="s-sessions"></div></div>
    <div class="stat"><div class="lbl" data-i18n="kpi_tokens"></div><div class="val" id="s-tokens"></div><div class="sub" data-i18n="sub_tokens"></div></div>
    <div class="stat"><div class="lbl" data-i18n="kpi_cost"></div><div class="val" id="s-cost"></div><div class="sub" data-i18n="sub_cost"></div></div>
    <div class="stat"><div class="lbl" data-i18n="kpi_projects"></div><div class="val" id="s-projects"></div></div>
    <div class="stat"><div class="lbl" data-i18n="kpi_duration"></div><div class="val" id="s-duration"></div><div class="sub" data-i18n="sub_duration"></div></div>
  </div>

  <div class="grid">
    <div class="card full"><h2 data-i18n="chart_time"></h2><div class="ch-wrap" style="height:240px"><canvas id="cTime"></canvas></div></div>
    <div class="card"><h2 data-i18n="chart_proj"></h2><div class="ch-wrap" style="height:210px"><canvas id="cProj"></canvas></div></div>
    <div class="card"><h2 data-i18n="chart_model"></h2><div class="ch-wrap" style="height:120px"><canvas id="cModel"></canvas></div></div>
    <div class="card full"><h2 data-i18n="chart_dur"></h2><div class="ch-wrap" style="height:140px"><canvas id="cDur"></canvas></div></div>
  </div>

  <div class="grid grid-4">
    <div class="card"><h2 data-i18n="chart_entrypoint"></h2><div class="ch-wrap" style="height:100px"><canvas id="cEntrypoint"></canvas></div></div>
    <div class="card"><h2 data-i18n="chart_perm"></h2><div class="ch-wrap" style="height:100px"><canvas id="cPerm"></canvas></div></div>
    <div class="card"><h2 data-i18n="chart_stopreason"></h2><div class="ch-wrap" style="height:120px"><canvas id="cStopReason"></canvas></div></div>
    <div class="card"><h2 data-i18n="chart_category"></h2><div class="ch-wrap" style="height:150px"><canvas id="cCategory"></canvas></div></div>
    <div class="card full"><h2 data-i18n="chart_tools"></h2><div class="ch-wrap" style="height:280px"><canvas id="cTools"></canvas></div></div>
    <div class="card full">
      <h2 data-i18n="chart_skills"></h2>
      <table class="data-table" id="tSkills">
        <thead><tr>
          <th data-i18n="th_skill"></th>
          <th data-i18n="th_project"></th>
          <th data-i18n="th_calls"></th>
          <th data-i18n="th_uniq_sessions"></th>
          <th data-i18n="th_last_used"></th>
        </tr></thead>
        <tbody id="tSkills-body"></tbody>
      </table>
    </div>
    <div class="card full"><h2 data-i18n="chart_heatmap"></h2><div id="heatmap-container"></div></div>
  </div>

  <div class="tables-section">
    <div class="card" style="margin-bottom:.85rem">
      <h2 data-i18n="tbl_proj_title"></h2>
      <table class="data-table" id="tProj">
        <thead><tr>
          <th onclick="sortTbl('tProj',0)" data-i18n="th_project"></th>
          <th onclick="sortTbl('tProj',1)" data-i18n="th_sessions"></th>
          <th onclick="sortTbl('tProj',2)" data-i18n="th_tokens"></th>
          <th onclick="sortTbl('tProj',3)" data-i18n="th_cost_usd"></th>
          <th onclick="sortTbl('tProj',4)" data-i18n="th_pct_total"></th>
          <th onclick="sortTbl('tProj',5)" data-i18n="th_model_col"></th>
        </tr></thead>
        <tbody id="tProj-body"></tbody>
      </table>
    </div>
    <div class="card" style="margin-bottom:.85rem">
      <h2 data-i18n="tbl_model_title"></h2>
      <table class="data-table" id="tModel">
        <thead><tr>
          <th onclick="sortTbl('tModel',0)" data-i18n="th_model"></th>
          <th onclick="sortTbl('tModel',1)" data-i18n="th_sessions"></th>
          <th onclick="sortTbl('tModel',2)" data-i18n="th_input"></th>
          <th onclick="sortTbl('tModel',3)" data-i18n="th_output"></th>
          <th onclick="sortTbl('tModel',4)" data-i18n="th_cache_read"></th>
          <th onclick="sortTbl('tModel',5)" data-i18n="th_cache_create"></th>
          <th onclick="sortTbl('tModel',6)" data-i18n="th_cost_usd"></th>
        </tr></thead>
        <tbody id="tModel-body"></tbody>
      </table>
    </div>
    <div class="card">
      <h2><span data-i18n="tbl_sessions_title"></span> <span id="sessions-count-label" style="font-weight:400;text-transform:none;font-size:.6rem;color:var(--muted)"></span></h2>
      <div id="sessions-table-wrap">
        <table class="data-table" id="tSessions">
          <thead><tr>
            <th onclick="sortTbl('tSessions',0)" data-i18n="th_date"></th>
            <th onclick="sortTbl('tSessions',1)" data-i18n="th_project"></th>
            <th onclick="sortTbl('tSessions',2)" data-i18n="th_dur"></th>
            <th onclick="sortTbl('tSessions',3)" data-i18n="th_model_col"></th>
            <th onclick="sortTbl('tSessions',4)" data-i18n="th_tokens"></th>
            <th onclick="sortTbl('tSessions',5)" data-i18n="th_cost"></th>
            <th onclick="sortTbl('tSessions',6)" data-i18n="th_stop_reason"></th>
          </tr></thead>
          <tbody id="tSessions-body"></tbody>
        </table>
      </div>
      <button id="btn-show-all" class="filter-btn" style="margin-top:.75rem;display:none" onclick="toggleAllSessions()"></button>
    </div>
  </div>

  <div class="tips-section">
    <div class="section-title" data-i18n="tips_title"></div>
    <div id="tips-container"></div>
  </div>

  <div class="claude-section">
    <div class="section-title" data-i18n="claude_title"></div>
    <div class="claude-card">
      <div class="claude-desc">
        <strong data-i18n="claude_desc_strong"></strong> <span data-i18n="claude_desc"></span>
      </div>
      <div class="claude-btns">
        <button class="btn-copy" id="btn-copy" onclick="copyClaudePrompt()"></button>
        <button class="filter-btn" id="btn-preview" onclick="togglePromptPreview()"></button>
      </div>
    </div>
    <div id="prompt-preview" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;margin-top:.6rem;overflow-x:auto">
      <pre id="prompt-preview-text" style="font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--muted);line-height:1.65;white-space:pre-wrap;word-break:break-word;margin:0"></pre>
    </div>
  </div>

<script>
const ALL_SESSIONS = __SESSIONS_JSON__;

const MODEL_COLORS = { sonnet:'#4f9eff', opus:'#a78bfa', haiku:'#34d399', mixed:'#fb923c' };
const PALETTE = ['#4f9eff','#34d399','#fb923c','#a78bfa','#ff5c73','#6ab0ff','#e3b341','#c084fc','#fda4af','#4ade80'];
const DUR_EDGES  = [0,5,15,30,60,120,9999];
const DUR_LABELS = ['<5 min','5-15 min','15-30 min','30-60 min','1-2 h','>2 h'];

// ── i18n ─────────────────────────────────────────────────────────────────────
const I18N = {
  es: {
    meta_generated:     'generado',
    btn_all:            'Todo',
    kpi_sessions:       'Sesiones',
    kpi_tokens:         'Tokens totales',
    kpi_cost:           'Costo estimado',
    kpi_projects:       'Proyectos',
    kpi_duration:       'Duracion media',
    sub_tokens:         'input + output',
    sub_cost:           'USD aproximado',
    sub_duration:       'por sesion',
    chart_time:         'Tokens por dia (input / output / cache)',
    chart_proj:         'Top proyectos (tokens)',
    chart_model:        'Modelo primario por sesion',
    chart_dur:          'Distribucion de duracion de sesiones',
    chart_entrypoint:   'Entrypoint por sesion',
    chart_perm:         'Modo de permisos',
    chart_stopreason:   'Razon de fin de sesion',
    chart_category:     'Tipo de sesion',
    categories: { coding:'Programacion', exploration:'Exploracion', automation:'Automatizacion', research:'Investigacion', conversation:'Conversacion', mixed:'Mixto' },
    chart_tools:        'Top 10 herramientas (llamadas totales)',
    chart_skills:       'Skills & Agents por proyecto',
    th_skill:           'Skill / Agent',
    th_calls:           'Llamadas',
    th_uniq_sessions:   'Sesiones',
    th_last_used:       'Último uso',
    no_skills:          'Sin skills ni agentes en este período.',
    tbl_proj_title:     'Costo por proyecto',
    th_pct_total:       '% total',
    chart_heatmap:      'Actividad por hora y día de semana',
    days:               ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],
    axis_tokens:        'Tokens',
    axis_usd:           'USD',
    ds_input:           'Input',

// ── State ─────────────────────────────────────────────────────────────────────
let activeDays   = 30;
let activeModels = new Set(['opus','sonnet','haiku','mixed']);
let theme = localStorage.getItem('theme') || 'dark';
let lang  = localStorage.getItem('lang')  || 'es';

// ── Filter helpers ────────────────────────────────────────────────────────────
function filterSessions() {
  const cutoff = activeDays > 0
    ? new Date(Date.now() - activeDays * 86400 * 1000)
    : null;
  return ALL_SESSIONS.filter(s => {
    if (cutoff && new Date(s.date + 'T00:00:00') < cutoff) return false;
    return activeModels.has(s.primary_model);
  });
}

function setDateFilter(days) {
  activeDays = days;
  document.querySelectorAll('.filter-group .filter-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.days) === days);
  });
  applyFilters();
}

function toggleModel(model) {
  if (activeModels.has(model)) { activeModels.delete(model); }
  else { activeModels.add(model); }
  applyFilters();
}

// ── Aggregation helpers ───────────────────────────────────────────────────────
function aggrByDate(sessions) {
  const map = {};
  for (const s of sessions) {
    if (!map[s.date]) map[s.date] = {input:0,output:0,cache_read:0,cache_create:0,cost:0,sessions:0};
    const d = map[s.date];
    d.input        += s.input_tokens;
    d.output       += s.output_tokens;
    d.cache_read   += s.cache_read;
    d.cache_create += s.cache_create;
    d.cost         += s.estimated_cost;
    d.sessions     += 1;
  }
  const dates = Object.keys(map).sort();
  return {dates, map};
}


function aggrByModel(sessions) {
  const map = {};
  for (const s of sessions) {
    if (!map[s.primary_model]) map[s.primary_model] = {sessions:0,input:0,output:0,cache_read:0,cache_create:0,cost:0};
    const m = map[s.primary_model];
    m.sessions     += 1;
    m.input        += s.input_tokens;
    m.output       += s.output_tokens;
    m.cache_read   += s.cache_read;
    m.cache_create += s.cache_create;
    m.cost         += s.estimated_cost;
  }
  return map;
}

function aggrDuration(sessions) {
  const counts = new Array(DUR_LABELS.length).fill(0);
  for (const s of sessions) {
    for (let i = 0; i < DUR_EDGES.length - 1; i++) {
      if (s.duration_min >= DUR_EDGES[i] && s.duration_min < DUR_EDGES[i+1]) {
        counts[i]++; break;
      }
    }
  }
  return counts;
}

function aggrByField(sessions, field) {
  const map = {};
  for (const s of sessions) {
    const v = s[field] || 'unknown';
    map[v] = (map[v] || 0) + 1;
  }
  return map;
}

const CAT_COLORS = {
  coding:      '#4f9eff',
  exploration: '#34d399',
  automation:  '#fb923c',
  research:    '#a78bfa',
  conversation:'#7fa9d4',
  mixed:       '#ff5c73',
};

function categorizeSession(tools) {
  const t = Object.fromEntries(Object.entries(tools).filter(([k]) => !k.startsWith('skill/') && !k.startsWith('agent/')));
  const total = Object.values(t).reduce((a, b) => a + b, 0);
  if (total === 0) return 'conversation';
  const sum = (...names) => names.reduce((a, n) => a + (t[n] || 0), 0);
  const web   = sum('WebSearch', 'WebFetch');
  const bash  = sum('Bash', 'PowerShell');
  const edits = sum('Edit', 'Write', 'NotebookEdit');
  const reads = sum('Read', 'Glob', 'Grep', 'NotebookRead', 'LS');
  if (web > 0)                                              return 'research';
  if (edits / total >= 0.2)                                 return 'coding';
  if (bash  / total >= 0.5 && edits / total < 0.1)         return 'automation';
  if (reads / total >= 0.5 && edits / total < 0.1)         return 'exploration';
  return 'mixed';
}

function aggrByCategory(sessions) {
  const map = {};
  for (const s of sessions) {
    if (s.project === 'temp') continue;
    const cat = categorizeSession(s.tools || {});
    map[cat] = (map[cat] || 0) + 1;
  }
  return map;
}

function aggrTools(sessions) {
  const map = {};
  for (const s of sessions) {
    for (const [tool, count] of Object.entries(s.tools || {})) {
      map[tool] = (map[tool] || 0) + count;
    }
  }
  return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 10);
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function updateKPIs(sessions) {
  const costEl = document.getElementById('s-cost');
  const sessEl = document.getElementById('s-sessions');
  if (!sessions.length) {
    ['s-sessions','s-tokens','s-cost','s-projects','s-duration'].forEach(id =>
      document.getElementById(id).textContent = '—');
    [costEl, sessEl].forEach(el => el.closest('.stat').classList.remove('kpi-ok','kpi-warn'));
    return;
  }
  const totalTokens = sessions.reduce((a,s) => a + s.total_tokens, 0);
  const totalCost   = sessions.reduce((a,s) => a + s.estimated_cost, 0);
  const projects    = new Set(sessions.map(s => s.project)).size;
  const avgDur      = sessions.reduce((a,s) => a + s.duration_min, 0) / sessions.length;
  document.getElementById('s-sessions').textContent = sessions.length.toLocaleString();
  document.getElementById('s-tokens').textContent   = (totalTokens / 1000).toFixed(0) + 'k';
  costEl.textContent     = '$' + totalCost.toFixed(2);
  document.getElementById('s-projects').textContent = projects;
  document.getElementById('s-duration').textContent = avgDur.toFixed(1) + ' min';

  const setKpiColor = (el, ok, warn) => {
    const stat = el.closest('.stat');
    stat.classList.toggle('kpi-ok',   ok);
    stat.classList.toggle('kpi-warn', warn);
  };
  setKpiColor(costEl, totalCost < 5, totalCost > 20);
  setKpiColor(sessEl, sessions.length > 20, sessions.length < 5);
}

// Splice-replace labels+data so Chart.js mutation tracking fires reliably,
// then force a full re-render (no animation) to pick up axis changes.
function _setBar(chart, labels, data, bg) {
  const ds = chart.data.datasets[0];
  chart.data.labels.splice(0, chart.data.labels.length, ...labels);
  ds.data.splice(0, ds.data.length, ...data);
  if (bg && bg.length) ds.backgroundColor = bg;
  chart.update('none');
}

function updateCharts(sessions) {
  const i = I18N[lang];
  const {dates, map} = aggrByDate(sessions);
  const ds = charts.time.data.datasets;
  charts.time.data.labels = dates;
  ds[0].data = dates.map(d=>map[d].input);
  ds[1].data = dates.map(d=>map[d].output);
  ds[2].data = dates.map(d=>map[d].cache_read);
  ds[3].data = dates.map(d=>map[d].cache_create);
  ds[4].data = dates.map(d=>+map[d].cost.toFixed(4));
  charts.time.options.plugins.tooltip.callbacks.afterBody =
    ctx => ctx[0] ? [i.tooltip_sessions+(map[ctx[0].label]?.sessions??'')] : [];
  charts.time.update();

  const proj = aggrByProject(sessions).sort((a,b)=>b[2]-a[2]).slice(0,10);
  charts.proj.options.plugins.tooltip.callbacks.afterLabel =
    ctx => ['sessions: '+proj[ctx.dataIndex][1],'cost: $'+proj[ctx.dataIndex][3].toFixed(2)];
  _setBar(charts.proj, proj.map(e=>e[0]), proj.map(e=>e[2]), PALETTE.slice(0, proj.length));

  const mCount = aggrByModel(sessions);
  const mKeys  = Object.keys(mCount);
  _setBar(charts.model, mKeys, mKeys.map(m=>mCount[m].sessions), mKeys.map(m=>MODEL_COLORS[m]||'#7d8590'));

  _setBar(charts.dur, DUR_LABELS, aggrDuration(sessions), null);

  const entryMap = aggrByField(sessions, 'entrypoint');
  _setBar(charts.entrypoint, Object.keys(entryMap), Object.values(entryMap), PALETTE.slice(0, Object.keys(entryMap).length));

  const permMap = aggrByField(sessions, 'permission_mode');
  _setBar(charts.perm, Object.keys(permMap), Object.values(permMap), PALETTE.slice(3, 3+Object.keys(permMap).length));

  const stopMap = aggrByField(sessions, 'stop_reason');
  _setBar(charts.stopreason, Object.keys(stopMap), Object.values(stopMap), ['#34d399','#ff5c73','#e3b341','#a78bfa'].slice(0, Object.keys(stopMap).length));

  const catMap2 = aggrByCategory(sessions);
  const catI2   = I18N[lang].categories;
  _setBar(charts.category,
    Object.keys(catMap2).map(k => catI2[k] || k),
    Object.values(catMap2),
    Object.keys(catMap2).map(k => CAT_COLORS[k] || '#888'));

  const toolsTop10 = aggrTools(sessions);
  _setBar(charts.tools, toolsTop10.map(e=>e[0]), toolsTop10.map(e=>e[1]), null);
}

function relativeTime(isoStr) {
  const mins = Math.floor((Date.now() - new Date(isoStr).getTime()) / 60000);
  if (mins < 2)  return lang === 'es' ? 'ahora'        : 'just now';
  if (mins < 60) return lang === 'es' ? `hace ${mins}m` : `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return lang === 'es' ? `hace ${hrs}h`  : `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return lang === 'es' ? `hace ${days}d` : `${days}d ago`;
  return lang === 'es' ? `hace ${Math.floor(days/30)}mo` : `${Math.floor(days/30)}mo ago`;
}

function renderTblBody(id, rows) {
  const tbody = document.getElementById(id + '-body');
  tbody.replaceChildren();
  if (!rows.length) {
    const tr = tbody.insertRow();
    const td = tr.insertCell();
    td.colSpan = 10;
    td.className = 'empty-row';
    td.textContent = I18N[lang].no_data;
    return;
  }
  const modelCol = id === 'tSessions' ? 3 : 0;
  for (const row of rows) {
    const tr = tbody.insertRow();
    for (let ci = 0; ci < row.length; ci++) {
      const td = tr.insertCell();
      if (ci === modelCol && row[ci] in MODEL_COLORS) {
        const span = document.createElement('span');
        span.className = 'model-tag ' + row[ci];
        span.textContent = row[ci];
        td.appendChild(span);
      } else {
        td.textContent = row[ci];
      }
    }
  }
}

function sortTbl(id, col) {
  if (!sortSt[id]) sortSt[id] = {col:-1,asc:true};
  const st = sortSt[id];
  st.asc = st.col === col ? !st.asc : true;
  st.col = col;
  const rows = [...tblData[id]].sort((a,b) => {
    const av = String(a[col]), bv = String(b[col]);
    const an = parseFloat(av.replace(/[^0-9.-]/g,'')), bn = parseFloat(bv.replace(/[^0-9.-]/g,''));
    const cmp = (!isNaN(an) && !isNaN(bn)) ? an-bn : av.localeCompare(bv);
    return st.asc ? cmp : -cmp;
  });
  tblData[id] = rows;
  if (id === 'tSessions') { renderSessionsBody(); }
  else if (id === 'tProj') { renderProjBody(); }
  else { renderTblBody(id, rows); }
  document.querySelectorAll('#'+id+' th').forEach((th,ci) => {
    th.classList.remove('sort-asc','sort-desc');
    if (ci===col) th.classList.add(st.asc?'sort-asc':'sort-desc');
  });
}

function updateModelTable(sessions) {
  const aggr = aggrByModel(sessions);
  const rows = Object.entries(aggr)
    .sort((a,b) => b[1].cost - a[1].cost)
    .map(([model,d]) => [
      model,
      d.sessions,
      (d.input/1000).toFixed(0),
      (d.output/1000).toFixed(0),
      (d.cache_read/1000).toFixed(0),
      (d.cache_create/1000).toFixed(0),
      '$'+d.cost.toFixed(2),
    ]);
  tblData['tModel'] = rows;
  renderTblBody('tModel', rows);
}

function updateSessionsTable(sessions) {
  const sorted = [...sessions].sort((a,b) => b.datetime.localeCompare(a.datetime));
  showAllSessions = false;
  tblData['tSessions'] = sorted.map(s => [
    relativeTime(s.datetime),
    s.project,
    s.duration_min.toFixed(0)+' min',
    s.primary_model,
    (s.total_tokens/1000).toFixed(0)+'k',
    '$'+s.estimated_cost.toFixed(4),
    s.stop_reason || '—',
  ]);
  renderSessionsBody();
}

function renderSessionsBody() {
  const all  = tblData['tSessions'] || [];
  const rows = showAllSessions ? all : all.slice(0, 20);
  renderTblBody('tSessions', rows);

  const wrap = document.getElementById('sessions-table-wrap');
  wrap.style.maxHeight = (showAllSessions && all.length > 20) ? '440px' : '';
  wrap.style.overflowY = (showAllSessions && all.length > 20) ? 'auto'  : '';

  const i     = I18N[lang];
  const label = document.getElementById('sessions-count-label');
  label.textContent = (!showAllSessions && all.length > 20)
    ? i.showing_n_of.replace('%n%', 20).replace('%total%', all.length)
    : i.n_sessions.replace('%n%', all.length);

  const btn = document.getElementById('btn-show-all');
  if (all.length <= 20) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  btn.textContent = showAllSessions
    ? i.show_less
    : i.show_all.replace('%n%', all.length);
}

function toggleAllSessions() {
  showAllSessions = !showAllSessions;
  renderSessionsBody();
}

// ── Tips — compute + render ───────────────────────────────────────────────────
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a,b) => a-b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}

function computeTips(sessions) {
  if (!sessions.length) return [];
  const tips             = [];
  const totalCost        = sessions.reduce((a,s) => a + s.estimated_cost, 0);
  const totalCacheRead   = sessions.reduce((a,s) => a + s.cache_read, 0);
  const totalCacheCreate = sessions.reduce((a,s) => a + s.cache_create, 0);
  const totalInput       = sessions.reduce((a,s) => a + s.input_tokens, 0);
  const totalOutput      = sessions.reduce((a,s) => a + s.output_tokens, 0);

  // 1. Cache hit rate
  const cacheable = totalInput + totalCacheRead + totalCacheCreate;
  const cacheRate = cacheable > 0 ? totalCacheRead / cacheable : 0;
  const cachePct  = Math.round(cacheRate * 100);
  if (cacheRate < 0.15) {
    tips.push({ level:'warn',
      title_es:'Baja tasa de cache',
      body_es:`Solo el ${cachePct}% de los tokens de entrada viene de cache. Sesiones mas largas y reusar contexto entre mensajes mejora esto.`,
      title_en:'Low cache hit rate',
      body_en:`Only ${cachePct}% of input tokens come from cache. Longer sessions and reusing context between messages improves this.`,
    });
  } else if (cacheRate >= 0.40) {
    tips.push({ level:'ok',
      title_es:'Buena tasa de cache',
      body_es:`${cachePct}% de tokens viene de cache -- buen uso del contexto de sesion.`,
      title_en:'Good cache hit rate',
      body_en:`${cachePct}% of tokens come from cache — good use of session context.`,
    });
  }

  // 2. Opus proportion
  const opusSess    = sessions.filter(s => s.primary_model==='opus' || s.primary_model==='mixed');
  const opusPct     = Math.round(opusSess.length / sessions.length * 100);
  const opusCost    = opusSess.reduce((a,s) => a + s.estimated_cost, 0);
  const opusCostPct = Math.round(totalCost > 0 ? opusCost / totalCost * 100 : 0);
  if (opusPct > 35) {
    tips.push({ level:'warn',
      title_es:'Alto uso de Opus',
      body_es:`${opusPct}% de sesiones usan Opus (${opusCostPct}% del costo). Opus es ideal para planning y debugging complejo -- revisa si todas las sesiones lo justifican.`,
      title_en:'High Opus usage',
      body_en:`${opusPct}% of sessions use Opus (${opusCostPct}% of cost). Opus is ideal for planning and complex debugging — review whether all sessions justify it.`,
    });
  }

  // 3. Short sessions
  const short    = sessions.filter(s => s.duration_min < 3);
  const shortPct = Math.round(short.length / sessions.length * 100);
  if (shortPct > 30) {
    tips.push({ level:'info',
      title_es:'Muchas sesiones muy cortas',
      body_es:`${shortPct}% de sesiones duran menos de 3 min. Cada sesion paga el costo de contexto inicial -- considera consolidar tareas cortas.`,
      title_en:'Many very short sessions',
      body_en:`${shortPct}% of sessions last under 3 min. Each session pays the initial context cost — consider consolidating short tasks.`,
    });
  }

  // 4. Long sessions
  const longSess = sessions.filter(s => s.duration_min > 120);
  if (longSess.length >= 3) {
    const avgCost = longSess.reduce((a,s) => a + s.estimated_cost, 0) / longSess.length;
    tips.push({ level:'info',
      title_es:'Sesiones muy largas',
      body_es:`${longSess.length} sesiones superan 2 h (costo promedio $${avgCost.toFixed(2)}). Claude pierde efectividad en contextos muy largos -- considera /compact o dividir en sesiones.`,
      title_en:'Very long sessions',
      body_en:`${longSess.length} sessions exceed 2 h (avg cost $${avgCost.toFixed(2)}). Claude loses effectiveness in very long contexts — consider /compact or splitting into sessions.`,
    });
  }

  // 5. Project cost concentration
  const byProjCost = {};
  for (const s of sessions) { byProjCost[s.project] = (byProjCost[s.project]||0) + s.estimated_cost; }
  const projEntries = Object.entries(byProjCost);
  if (projEntries.length > 2) {
    const [topProj, topCost] = projEntries.sort((a,b) => b[1]-a[1])[0];
    const topPct = Math.round(totalCost > 0 ? topCost / totalCost * 100 : 0);
    if (topPct > 60) {
      tips.push({ level:'info',
        title_es:'Costo concentrado en un proyecto',
        body_es:`'${topProj}' representa el ${topPct}% del costo total ($${topCost.toFixed(2)}). Puede ser intencional, pero vale revisarlo si el proyecto ya esta estable.`,
        title_en:'Cost concentrated in one project',
        body_en:`'${topProj}' accounts for ${topPct}% of total cost ($${topCost.toFixed(2)}). May be intentional, but worth reviewing if the project is already stable.`,
      });
    }
  }

  // 6. High output:input ratio
  if (totalInput > 0) {
    const ratio = totalOutput / totalInput;
    if (ratio > 0.8) {
      tips.push({ level:'info',
        title_es:'Relacion output/input alta',
        body_es:`Output es el ${Math.round(ratio*100)}% del input. El output es 5-25x mas caro que el input -- prompts mas precisos reducen los tokens generados.`,
        title_en:'High output/input ratio',
        body_en:`Output is ${Math.round(ratio*100)}% of input. Output costs 5-25x more than input — more precise prompts reduce generated tokens.`,
      });
    }
  }

  // 7. Median session duration
  const med = median(sessions.map(s => s.duration_min));
  if (med >= 20) {
    tips.push({ level:'ok',
      title_es:'Sesiones de buena duracion',
      body_es:`Duracion mediana de ${Math.round(med)} min -- sesiones bien aprovechadas.`,
      title_en:'Good session duration',
      body_en:`Median duration of ${Math.round(med)} min — sessions are well-utilized.`,
    });
  }

  // 8. max_tokens rate
  const maxTokPct = sessions.filter(s => s.stop_reason==='max_tokens').length / sessions.length;
  if (maxTokPct > 0.05) {
    tips.push({ level:'warn',
      title_es:'Sesiones que alcanzan el limite de contexto',
      body_es:`${Math.round(maxTokPct*100)}% de sesiones alcanzan el limite de tokens. Usa /compact antes de que el contexto se llene o divide en sesiones mas cortas.`,
      title_en:'Sessions hitting context limit',
      body_en:`${Math.round(maxTokPct*100)}% of sessions hit the token limit. Use /compact before context fills up or split into shorter sessions.`,
    });
  }

  return tips;
}

function buildClaudePrompt(sessions, tips, l) {
  if (!sessions.length) return '';
  const sorted = [...sessions].sort((a,b) => a.datetime.localeCompare(b.datetime));
  const totalTokens      = sessions.reduce((a,s) => a + s.total_tokens, 0);
  const totalCost        = sessions.reduce((a,s) => a + s.estimated_cost, 0);
  const totalInput       = sessions.reduce((a,s) => a + s.input_tokens, 0);
  const totalOutput      = sessions.reduce((a,s) => a + s.output_tokens, 0);
  const totalCacheRead   = sessions.reduce((a,s) => a + s.cache_read, 0);
  const totalCacheCreate = sessions.reduce((a,s) => a + s.cache_create, 0);
  const medDur           = median(sessions.map(s => s.duration_min));
  const cacheable        = totalInput + totalCacheRead + totalCacheCreate;
  const cacheRate        = cacheable > 0 ? totalCacheRead / cacheable : 0;

  const byProj = {};
  for (const s of sessions) {
    if (!byProj[s.project]) byProj[s.project] = {tokens:0,cost:0,sessions:0};
    byProj[s.project].tokens   += s.total_tokens;
    byProj[s.project].cost     += s.estimated_cost;
    byProj[s.project].sessions += 1;
  }
  const top5 = Object.entries(byProj).sort((a,b) => b[1].cost-a[1].cost).slice(0,5);

  const modelCount = {};
  for (const s of sessions) { modelCount[s.primary_model] = (modelCount[s.primary_model]||0)+1; }

  const sw         = l === 'en' ? 'sessions' : 'sesiones';
  const tipLines   = tips.map(t=>`- [${t.level.toUpperCase()}] ${t['title_'+l]}: ${t['body_'+l]}`).join('\n');
  const projLines  = top5.map(([n,d])=>`  - ${n}: ${d.sessions} ${sw}, ${d.tokens.toLocaleString()} tokens, $${d.cost.toFixed(2)}`).join('\n');
  const modelLines = Object.entries(modelCount).sort().map(([m,c])=>`  - ${m}: ${c} ${sw}`).join('\n');

  const firstDate = sorted[0].date;
  const lastDate  = sorted[sorted.length-1].date;

  if (l === 'en') return `Here are my Claude Code usage metrics. Analyze them and give me concrete recommendations to improve my workflow, reduce costs, and improve session quality.

## General summary
- Period: ${firstDate} -> ${lastDate}
- Total sessions: ${sessions.length}
- Active projects: ${Object.keys(byProj).length}
- Total tokens: ${totalTokens.toLocaleString()} (input: ${totalInput.toLocaleString()}, output: ${totalOutput.toLocaleString()})
- Estimated cost: $${totalCost.toFixed(2)} USD
- Median session duration: ${Math.round(medDur)} min
- Cache rate: ${Math.round(cacheRate*100)}% (read: ${totalCacheRead.toLocaleString()}, create: ${totalCacheCreate.toLocaleString()})

## Distribution by project (top 5)
${projLines}

## Distribution by model
${modelLines}

## Automatically detected tips
${tipLines || '  (none)'}

## Questions I'd like to answer
1. What patterns suggest inefficient usage?
2. How could I improve the cache rate?
3. Does the Sonnet/Opus balance make sense for the type of work I do?
4. What should I change in my longer sessions?
5. Are there any warning signs I'm not capturing with the automatic rules?`.trim();

  return `Aqui estan mis metricas de uso de Claude Code. Analizalas y dame recomendaciones concretas para mejorar mi flujo de trabajo, reducir costos y mejorar la calidad de mis sesiones.

## Resumen general
- Periodo: ${firstDate} -> ${lastDate}
- Sesiones totales: ${sessions.length}
- Proyectos activos: ${Object.keys(byProj).length}
- Tokens totales: ${totalTokens.toLocaleString()} (input: ${totalInput.toLocaleString()}, output: ${totalOutput.toLocaleString()})
- Costo estimado: $${totalCost.toFixed(2)} USD
- Duracion mediana de sesion: ${Math.round(medDur)} min
- Tasa de cache: ${Math.round(cacheRate*100)}% (read: ${totalCacheRead.toLocaleString()}, create: ${totalCacheCreate.toLocaleString()})

## Distribucion por proyecto (top 5)
${projLines}

## Distribucion por modelo
${modelLines}

## Tips automaticos detectados
${tipLines || '  (ninguno)'}

## Preguntas que me gustaria responder
1. Que patrones ves que sugieran uso ineficiente?
2. Como podria mejorar la tasa de cache?
3. El balance Sonnet/Opus tiene sentido para el tipo de trabajo que hago?
4. Que deberia cambiar en mis sesiones mas largas?
5. Hay alguna senal de alerta que no este captando con las reglas automaticas?`.trim();
}

function renderTips(sessions, tips) {
  const container = document.getElementById('tips-container');
  container.replaceChildren();
  const resolved = tips ?? computeTips(sessions);
  if (!resolved.length) {
    const p = document.createElement('p');
    p.style.cssText = 'font-size:.75rem;color:var(--muted)';
    p.textContent = I18N[lang].no_tips;
    container.appendChild(p);
    return;
  }
  for (const t of resolved) {
    const wrap  = document.createElement('div');
    wrap.className = 'tip ' + t.level;
    const icon  = document.createElement('div');
    icon.className   = 'tip-icon';
    icon.textContent = t.level === 'warn' ? '▲' : t.level === 'ok' ? '●' : '◆';
    const body  = document.createElement('div');
    const title = document.createElement('div');
    title.className   = 'tip-title';
    title.textContent = t['title_' + lang];
    const desc  = document.createElement('div');
    desc.className   = 'tip-body';
    desc.textContent = t['body_' + lang];
    body.appendChild(title);
    body.appendChild(desc);
    wrap.appendChild(icon);
    wrap.appendChild(body);
    container.appendChild(wrap);
  }
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function buildHeatmapGrid(sessions) {
  const grid = Array.from({length:7}, () => new Array(24).fill(0));
  for (const s of sessions) {
    const d    = new Date(s.datetime);
    const dow  = (d.getDay() + 6) % 7; // 0=Mon..6=Sun
    const hour = d.getHours();
    grid[dow][hour]++;
  }
  return grid;
}

function renderHeatmap(sessions) {
  const container = document.getElementById('heatmap-container');
  container.replaceChildren();
  const i    = I18N[lang];
  const grid = buildHeatmapGrid(sessions);
  const max  = Math.max(1, ...grid.flat());
  const isDark = theme === 'dark';
  const rgb  = isDark ? '79,158,255' : '21,101,192';
  const alphas = [.07, .22, .44, .66, .88];

  function cellColor(count) {
    if (count === 0) return `rgba(${rgb},.05)`;
    return `rgba(${rgb},${alphas[Math.min(4, Math.ceil(count / max * 4))]})`;
  }

  const wrap = document.createElement('div');
  wrap.className = 'heatmap-wrap';
  const g = document.createElement('div');
  g.className = 'heatmap-grid';

  // Hour label row
  const corner = document.createElement('div');
  corner.className = 'hm-label';
  g.appendChild(corner);
  for (let h = 0; h < 24; h++) {
    const lbl = document.createElement('div');
    lbl.className = 'hm-label hm-hour';
    lbl.textContent = h;
    g.appendChild(lbl);
  }

  // Day rows
  for (let d = 0; d < 7; d++) {
    const dayLbl = document.createElement('div');
    dayLbl.className = 'hm-label hm-day';
    dayLbl.textContent = i.days[d];
    g.appendChild(dayLbl);
    for (let h = 0; h < 24; h++) {
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      cell.style.background = cellColor(grid[d][h]);
      cell.title = `${i.days[d]} ${String(h).padStart(2,'0')}:00 — ${grid[d][h]}`;
      g.appendChild(cell);
    }
  }

  wrap.appendChild(g);
  container.appendChild(wrap);
}

// ── Skills & Agents ───────────────────────────────────────────────────────────
function aggrSkills(sessions) {
  const map = {};
  for (const s of sessions) {
    for (const [tool, count] of Object.entries(s.tools || {})) {
      if (!tool.startsWith('skill/') && !tool.startsWith('agent/')) continue;
      const key = tool + '\0' + (s.project || 'unknown');
      if (!map[key]) map[key] = { calls: 0, sids: new Set(), lastUsed: '' };
      map[key].calls += count;
      map[key].sids.add(s.session_id);
      if (s.datetime > map[key].lastUsed) map[key].lastUsed = s.datetime;
    }
  }
  return Object.entries(map)
    .map(([k, v]) => {
      const [name, proj] = k.split('\0');
      return [name, proj, v.calls, v.sids.size, v.lastUsed];
    })
    .sort((a, b) => b[2] - a[2]);
}

function updateSkillsTable(sessions) {
  const i     = I18N[lang];
  const rows  = aggrSkills(sessions);
  const tbody = document.getElementById('tSkills-body');
  tbody.replaceChildren();
  if (!rows.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 5; td.className = 'empty-row'; td.textContent = i.no_skills;
    tr.appendChild(td); tbody.appendChild(tr);
    return;
  }
  for (const [name, proj, calls, uniq, lastUsed] of rows) {
    const tr = document.createElement('tr');
    [name, proj, String(calls), String(uniq), relativeTime(lastUsed)].forEach(text => {
      const td = document.createElement('td');
      td.textContent = text;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

// ── Cost by project ───────────────────────────────────────────────────────────
function aggrByProject(sessions) {
  const map = {};
  for (const s of sessions) {
    const proj = s.project || 'unknown';
    if (!map[proj]) map[proj] = { sessions: 0, tokens: 0, cost: 0, models: {} };
    map[proj].sessions++;
    map[proj].tokens += s.total_tokens || 0;
    map[proj].cost   += s.estimated_cost || 0;
    const m = s.primary_model || 'unknown';
    map[proj].models[m] = (map[proj].models[m] || 0) + 1;
  }
  const totalCost = Object.values(map).reduce((a, v) => a + v.cost, 0);
  return Object.entries(map)
    .map(([proj, v]) => {
      const topModel = Object.entries(v.models).sort((a, b) => b[1] - a[1])[0]?.[0] || 'unknown';
      const pct = totalCost > 0 ? (v.cost / totalCost * 100) : 0;
      return [proj, v.sessions, v.tokens, v.cost, pct, topModel];
    })
    .sort((a, b) => b[3] - a[3]);
}

function renderProjBody() {
  const tbody = document.getElementById('tProj-body');
  tbody.replaceChildren();
  for (const [proj, sess, tokens, cost, pct, model] of (tblData['tProj'] || [])) {
    const tr = document.createElement('tr');
    const tier = model === 'mixed' ? 'mixed' : model.includes('opus') ? 'opus' : model.includes('haiku') ? 'haiku' : 'sonnet';
    const cells = [proj, String(sess), (tokens/1000).toFixed(0)+'k', '$'+cost.toFixed(2), pct.toFixed(1)+'%'];
    cells.forEach(text => { const td = document.createElement('td'); td.textContent = text; tr.appendChild(td); });
    const tdModel = document.createElement('td');
    const tag = document.createElement('span');
    tag.className = 'model-tag ' + tier;
    tag.textContent = model;
    tdModel.appendChild(tag);
    tr.appendChild(tdModel);
    tbody.appendChild(tr);
  }
}

function updateProjectTable(sessions) {
  tblData['tProj'] = aggrByProject(sessions);
  renderProjBody();
}

// ── Apply filters ─────────────────────────────────────────────────────────────
function applyFilters() {
  const f    = filterSessions();
  const tips = computeTips(f);
  updateKPIs(f);
  updateCharts(f);
  updateProjectTable(f);
  updateModelTable(f);
  updateSessionsTable(f);
  updateSkillsTable(f);
  renderHeatmap(f);
  renderTips(f, tips);
  updateDateRangeLabel(f);
  _refreshPromptPreview(f, tips);
}

// ── Date range label ─────────────────────────────────────────────────────────
function updateDateRangeLabel(sessions) {
  const el = document.getElementById('date-range-label');
  if (!sessions.length) { el.textContent = ''; return; }
  const dates = sessions.map(s => s.date).sort();
  el.textContent = dates[0] === dates[dates.length-1]
    ? dates[0]
    : `${dates[0]} → ${dates[dates.length-1]}`;
}

// ── Prompt preview ────────────────────────────────────────────────────────────
let showPromptPreview = false;

function togglePromptPreview() {
  showPromptPreview = !showPromptPreview;
  const el  = document.getElementById('prompt-preview');
  const btn = document.getElementById('btn-preview');
  const i   = I18N[lang];
  el.style.display = showPromptPreview ? '' : 'none';
  btn.textContent  = showPromptPreview ? i.btn_preview_hide : i.btn_preview;
  if (showPromptPreview) _refreshPromptPreview();
}

function _refreshPromptPreview(f, tips) {
  if (!showPromptPreview) return;
  const sessions = f    ?? filterSessions();
  const t        = tips ?? computeTips(sessions);
  document.getElementById('prompt-preview-text').textContent = buildClaudePrompt(sessions, t, lang);
}

// ── Claude prompt copy ────────────────────────────────────────────────────────
function copyClaudePrompt() {
  const btn   = document.getElementById('btn-copy');
  const i     = I18N[lang];
  const reset = () => { btn.textContent = i.btn_copy; btn.classList.remove('copied'); };
  const done  = () => { btn.textContent = i.btn_copied; btn.classList.add('copied'); setTimeout(reset, 2500); };
  const f    = filterSessions();
  const text = buildClaudePrompt(f, computeTips(f), lang);
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); done(); } catch(_) {}
    document.body.removeChild(ta);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.documentElement.setAttribute('data-theme', theme);
document.documentElement.lang = lang;
Chart.defaults.color       = theme === 'dark' ? '#7fa9d4' : '#5b7fa6';
Chart.defaults.borderColor = theme === 'dark' ? 'rgba(79,158,255,.15)' : 'rgba(21,101,192,.15)';
if (theme === 'light') document.getElementById('btn-theme').textContent = '☾';
if (lang  !== 'es')   document.getElementById('btn-lang').textContent  = 'ES';

const initial = filterSessions();
initCharts(initial);
updateKPIs(initial);
updateProjectTable(initial);
updateModelTable(initial);
updateSessionsTable(initial);
updateSkillsTable(initial);
renderTips(initial);
renderHeatmap(initial);
updateDateRangeLabel(initial);
applyLang();
</script>
