name: CI

on:
  push:
    branches: ["develop", "master"]
  pull_request:
    branches: ["develop", "master"]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: python -m pytest tests/test_log_parser.py tests/test_tips.py -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-playwright

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: E2E tests
        run: python -m pytest tests/test_e2e.py -v
